<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalkBridge</title>

  <script>
    if (localStorage.getItem("app-theme") === "dark") {
      document.addEventListener("DOMContentLoaded", function () {
        document.body.classList.add("dark-mode");
      });

      const style = document.createElement("style");
      style.id = "flash-fix";
      style.innerHTML = `
        body {
          background-color: #0f172a !important;
          color: #f8fafc !important;
          transition: none !important;
        }
      `;
      document.head.appendChild(style);
    }
  </script>

  <link rel="stylesheet" href="chat.css" />
  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="toggle.css" />
</head>

<body>
  <div class="layout">
    <!-- <button class="about-btn" onclick="goAbout()">About Us</button> -->
    <!-- LEFT -->
    <div class="contacts">
      <!-- USER INFO -->
      <div class="me-box" onclick="goProfile()">
        <img id="myPhoto" />
        <div id="myName"></div>
      </div>

      <hr />

      <!-- FRIEND REQUEST SECTION -->
      <h3>Friend Requests</h3>
      <div id="notifications"></div>

      <hr />

      <!-- SEARCH -->
      <h3>Search</h3>
      <input id="searchInput" placeholder="username" autocomplete="off" />
      <div id="searchResult"></div>

      <hr />

      <!-- CONTACTS -->
      <h3>Contacts</h3>
      <div id="contacts"></div>
                 <div class="about-wrap">
  <button class="about-btn" onclick="goAbout()">About Us</button>
</div>
    </div>

   

    <!-- RIGHT -->
    <div class="chat-area">
      <div class="header">
        <span id="chatWith"></span>
        <span id="typing" class="typing"></span>

        <!-- Video Call Button (left of theme toggle) -->
 <button id="videoCallBtn" class="video-call-btn" onclick="startCall()" aria-label="Smart Call: Sign to Speech and Speech to Sign">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M15 10.5V6a2 2 0 0 0-2-2H5A2 2 0 0 0 3 6v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-4.5l6 4V6.5l-6 4z"/>
  </svg>
  <span class="vc-text">Smart Call: Sign ↔ Speech</span>
  <span class="vc-tooltip">
    Smart Camera powered by a Machine Learning model for real-time Sign ↔ Speech translation.
  </span>
  <span class="ml-badge"></span>
</button>

        <!-- <button id="theme-toggle" class="theme-btn" title="Switch Theme">🌙</button> -->
      </div>

      <div id="chat"></div>

      <!-- WELCOME -->
      <div id="welcome" class="welcome">
        Welcome to <b>TalkBridge</b> 👋
      </div>

      <!-- SEND -->
      <div class="send-area" id="sendArea">
        <input id="msg" placeholder="Type a message" autocomplete="off" />
        <button onclick="send()">Send</button>
      </div>
    </div>
  </div>

  <!-- ALERT -->
  <div id="alertModal" class="modal">
    <div class="modal-box">
      <p id="alertMessage"></p>
      <button onclick="closeAlert()">OK</button>
    </div>
  </div>

  <!-- CALL -->
  <div id="callModal" class="modal">
    <div class="modal-box">
      <p>📞 Incoming call</p>
      <div class="call-actions">
        <button onclick="acceptCall()">Accept</button>
        <button class="decline" onclick="declineCall()">Decline</button>
      </div>
    </div>
  </div>

  <!-- message sound -->
  <audio
    id="msgSound"
    src="https://notificationsounds.com/storage/sounds/file-sounds-1150-pristine.mp3"
  ></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="chat-core.js"></script>
<script src="chat-contacts.js"></script>
<script src="chat-search-requests.js"></script>
<script src="chat-call.js"></script>
<script src="toggle.js"></script>
</body>
</html>
