<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="profile.css">
</head>

<body>

<div class="profile-card">
  <h2>My Profile</h2>

  <img id="avatar" src="" />

  <p><b>Username:</b> <span id="username"></span></p>

  <button onclick="goChat()">Back to Chat</button>
</div>

<script src="profile.js"></script>

</body>
</html>
